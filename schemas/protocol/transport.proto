syntax = "proto3";

package motionlab.protocol;

import "mechanism/mechanism.proto";

/**
 * Transport envelope schema — frontend ↔ engine communication.
 *
 * Commands flow from frontend to engine.
 * Events flow from engine to frontend.
 * Frames are high-frequency streamed data (simulation playback).
 */

// Protocol version for compatibility checking
message ProtocolVersion {
  string name = 1;
  uint32 version = 2;
}

// Command envelope: frontend → engine
message Command {
  uint64 sequence_id = 1;
  oneof payload {
    Handshake handshake = 10;
    Ping ping = 11;
    ImportAssetCommand import_asset = 12;
    CreateDatumCommand create_datum = 13;
    DeleteDatumCommand delete_datum = 14;
    RenameDatumCommand rename_datum = 15;
    CreateDatumFromFaceCommand create_datum_from_face = 16;
    UpdateBodyCommand update_body = 17;
    UpdateDatumPoseCommand update_datum_pose = 18;
    CreateJointCommand create_joint = 20;
    UpdateJointCommand update_joint = 21;
    DeleteJointCommand delete_joint = 22;
    CreateLoadCommand create_load = 23;
    UpdateLoadCommand update_load = 24;
    DeleteLoadCommand delete_load = 25;
    CreateActuatorCommand create_actuator = 26;
    UpdateActuatorCommand update_actuator = 27;
    DeleteActuatorCommand delete_actuator = 28;
    CreateBodyCommand create_body = 50;
    DeleteBodyCommand delete_body = 51;
    AttachGeometryCommand attach_geometry = 52;
    DetachGeometryCommand detach_geometry = 53;
    UpdateMassPropertiesCommand update_mass_properties = 54;
    CreatePrimitiveBodyCommand create_primitive_body = 55;
    DeleteGeometryCommand delete_geometry = 56;
    RenameGeometryCommand rename_geometry = 57;
    UpdatePrimitiveCommand update_primitive = 58;
    UpdateCollisionConfigCommand update_collision_config = 59;
    PlaceAssetInSceneCommand place_asset_in_scene = 60;
    CompileMechanismCommand compile_mechanism = 30;
    SimulationControlCommand simulation_control = 31;
    ScrubCommand scrub = 32;
    SaveProjectCommand save_project = 40;
    LoadProjectCommand load_project = 41;
    RelocateAssetCommand relocate_asset = 42;
    NewProjectCommand new_project = 43;
  }
}

// Event envelope: engine → frontend
message Event {
  uint64 sequence_id = 1;
  oneof payload {
    HandshakeAck handshake_ack = 10;
    Pong pong = 11;
    EngineStatus engine_status = 12;
    ImportAssetResult import_asset_result = 13;
    MechanismSnapshot mechanism_snapshot = 14;
    CreateDatumResult create_datum_result = 15;
    DeleteDatumResult delete_datum_result = 16;
    RenameDatumResult rename_datum_result = 17;
    CreateDatumFromFaceResult create_datum_from_face_result = 18;
    UpdateBodyResult update_body_result = 19;
    CreateJointResult create_joint_result = 20;
    UpdateJointResult update_joint_result = 21;
    DeleteJointResult delete_joint_result = 22;
    UpdateDatumPoseResult update_datum_pose_result = 23;
    CreateLoadResult create_load_result = 24;
    UpdateLoadResult update_load_result = 25;
    DeleteLoadResult delete_load_result = 26;
    CreateActuatorResult create_actuator_result = 27;
    UpdateActuatorResult update_actuator_result = 28;
    DeleteActuatorResult delete_actuator_result = 29;
    CreateBodyResult create_body_result = 50;
    DeleteBodyResult delete_body_result = 51;
    AttachGeometryResult attach_geometry_result = 52;
    DetachGeometryResult detach_geometry_result = 53;
    UpdateMassPropertiesResult update_mass_properties_result = 54;
    CreatePrimitiveBodyResult create_primitive_body_result = 55;
    DeleteGeometryResult delete_geometry_result = 56;
    RenameGeometryResult rename_geometry_result = 57;
    UpdatePrimitiveResult update_primitive_result = 58;
    UpdateCollisionConfigResult update_collision_config_result = 59;
    PlaceAssetInSceneResult place_asset_in_scene_result = 60;
    CompilationResultEvent compilation_result = 30;
    SimulationStateEvent simulation_state = 31;
    SimulationFrame simulation_frame = 32;
    SimulationTrace simulation_trace = 33;
    SaveProjectResult save_project_result = 40;
    LoadProjectResult load_project_result = 41;
    RelocateAssetResult relocate_asset_result = 42;
    NewProjectResult new_project_result = 43;
  }
}

// Initial handshake
message Handshake {
  ProtocolVersion protocol = 1;
  string session_token = 2;
}

message HandshakeAck {
  bool compatible = 1;
  ProtocolVersion engine_protocol = 2;
  string engine_version = 3;
}

message Ping {
  uint64 timestamp = 1;
}

message Pong {
  uint64 timestamp = 1;
}

message EngineStatus {
  enum State {
    STATE_UNSPECIFIED = 0;
    STATE_INITIALIZING = 1;
    STATE_READY = 2;
    STATE_BUSY = 3;
    STATE_ERROR = 4;
    STATE_SHUTTING_DOWN = 5;
  }
  State state = 1;
  string message = 2;
}

// Import placement mode
enum ImportMode {
  IMPORT_MODE_AUTO_BODY = 0;     // Default: each part creates Body + Geometry (current behavior)
  IMPORT_MODE_VISUAL_ONLY = 1;   // Geometry only, no bodies — for manual body authoring
}

message ImportOptions {
  double density_override = 1;       // kg/m³, 0 = use default (1000)
  double tessellation_quality = 2;   // linear deflection, 0 = use default (0.1)
  string unit_system = 3;           // source CAD length units; engine normalizes to meters
  ImportMode import_mode = 4;       // placement mode, default AUTO_BODY
}

message ImportAssetCommand {
  string file_path = 1;
  ImportOptions import_options = 2;
}

message BodyImportResult {
  string body_id = 1;                              // UUIDv7
  string name = 2;
  motionlab.mechanism.DisplayMesh display_mesh = 3;
  motionlab.mechanism.MassProperties mass_properties = 4;
  motionlab.mechanism.Pose pose = 5;
  motionlab.mechanism.AssetReference source_asset_ref = 6;
  repeated uint32 part_index = 7;
}

message GeometryImportResult {
  string geometry_id = 1;                                   // UUIDv7
  string body_id = 2;                                       // auto-created parent body
  string name = 3;
  motionlab.mechanism.DisplayMesh display_mesh = 4;
  motionlab.mechanism.MassProperties computed_mass_properties = 5;
  motionlab.mechanism.Pose pose = 6;
  motionlab.mechanism.AssetReference source_asset_ref = 7;
  repeated uint32 part_index = 8;
  uint32 face_count = 9;
  motionlab.mechanism.PrimitiveSource primitive_source = 10;
}

message ImportAssetResult {
  bool success = 1;
  string error_message = 2;
  repeated BodyImportResult bodies = 3;            // DEPRECATED — kept for backward compat
  repeated string diagnostics = 4;
  repeated GeometryImportResult geometries = 5;    // v4 clients use this
  string asset_id = 6;                             // cache_key for subsequent PlaceAssetInScene
}

// Serialized mechanism snapshot for persistence and transport
message MechanismSnapshot {
  motionlab.mechanism.Mechanism mechanism = 1;
}

// Datum CRUD — Command→Result pattern with oneof success/error

message CreateDatumCommand {
  motionlab.mechanism.ElementId parent_body_id = 1;
  motionlab.mechanism.Pose local_pose = 2;
  string name = 3;
}

message DeleteDatumCommand {
  motionlab.mechanism.ElementId datum_id = 1;
}

message RenameDatumCommand {
  motionlab.mechanism.ElementId datum_id = 1;
  string name = 2;
}

enum FaceSurfaceClass {
  FACE_SURFACE_CLASS_UNSPECIFIED = 0;
  FACE_SURFACE_CLASS_PLANAR = 1;
  FACE_SURFACE_CLASS_CYLINDRICAL = 2;
  FACE_SURFACE_CLASS_CONICAL = 3;
  FACE_SURFACE_CLASS_SPHERICAL = 4;
  FACE_SURFACE_CLASS_OTHER = 5;
  FACE_SURFACE_CLASS_TOROIDAL = 6;
}

// Enriched geometry metadata extracted from the B-Rep face surface.
// Fields are populated based on surface class:
//   PLANAR:      normal
//   CYLINDRICAL: axis_direction, radius
//   CONICAL:     axis_direction, radius, semi_angle
//   SPHERICAL:   radius
//   TOROIDAL:    axis_direction, radius, secondary_radius
message FaceGeometryMetadata {
  optional motionlab.mechanism.Vec3 axis_direction = 1;
  optional motionlab.mechanism.Vec3 normal = 2;
  optional double radius = 3;
  optional double secondary_radius = 4;
  optional double semi_angle = 5;
}

message CreateDatumFromFaceCommand {
  motionlab.mechanism.ElementId geometry_id = 1;
  uint32 face_index = 2;
  string name = 3;
}

message CreateDatumFromFaceSuccess {
  motionlab.mechanism.Datum datum = 1;
  uint32 face_index = 2;
  FaceSurfaceClass surface_class = 3;
  motionlab.mechanism.ElementId geometry_id = 4;
  FaceGeometryMetadata face_geometry = 5;
}

message CreateDatumResult {
  oneof result {
    motionlab.mechanism.Datum datum = 1;
    string error_message = 2;
  }
}

message CreateDatumFromFaceResult {
  oneof result {
    CreateDatumFromFaceSuccess success = 1;
    string error_message = 2;
  }
}

message DeleteDatumResult {
  oneof result {
    motionlab.mechanism.ElementId deleted_id = 1;
    string error_message = 2;
  }
}

message RenameDatumResult {
  oneof result {
    motionlab.mechanism.Datum datum = 1;
    string error_message = 2;
  }
}

message UpdateDatumPoseCommand {
  motionlab.mechanism.ElementId datum_id = 1;
  motionlab.mechanism.Pose new_local_pose = 2;
}

message UpdateDatumPoseResult {
  oneof result {
    motionlab.mechanism.Datum datum = 1;
    string error_message = 2;
  }
}

// Body update — toggle fixed/ground status, rename

message UpdateBodyCommand {
  motionlab.mechanism.ElementId body_id = 1;
  optional bool is_fixed = 2 [deprecated = true];  // Use motion_type instead
  optional string name = 3;
  optional motionlab.mechanism.Pose pose = 4;
  optional motionlab.mechanism.MotionType motion_type = 5;
}

message UpdateBodyResult {
  oneof result {
    motionlab.mechanism.Body body = 1;
    string error_message = 2;
  }
}

// ──────────────────────────────────────────────
// Body & Geometry CRUD (Epic 13)
// ──────────────────────────────────────────────

// Create an empty body with optional initial mass properties
message CreateBodyCommand {
  string name = 1;
  motionlab.mechanism.MassProperties mass_properties = 2;  // optional
  motionlab.mechanism.Pose pose = 3;                        // optional
  bool is_fixed = 4 [deprecated = true];  // Use motion_type instead
  motionlab.mechanism.MotionType motion_type = 5;
}

message CreateBodyResult {
  oneof result {
    motionlab.mechanism.Body body = 1;
    string error_message = 2;
  }
}

// Delete a body and all attached geometries, datums, and dependent joints
message DeleteBodyCommand {
  motionlab.mechanism.ElementId body_id = 1;
}

message DeleteBodyResult {
  oneof result {
    motionlab.mechanism.ElementId deleted_id = 1;
    string error_message = 2;
  }
}

// Attach a geometry to a body (or reassign from another body)
message AttachGeometryCommand {
  motionlab.mechanism.ElementId geometry_id = 1;
  motionlab.mechanism.ElementId target_body_id = 2;
  motionlab.mechanism.Pose local_pose = 3;  // optional offset
}

message AttachGeometryResult {
  oneof result {
    motionlab.mechanism.Geometry geometry = 1;
    string error_message = 2;
  }
  motionlab.mechanism.Body old_parent_body = 3;
  motionlab.mechanism.Body new_parent_body = 4;
}

// Detach geometry from its parent body (geometry becomes unparented)
message DetachGeometryCommand {
  motionlab.mechanism.ElementId geometry_id = 1;
}

message DetachGeometryResult {
  oneof result {
    motionlab.mechanism.ElementId detached_id = 1;
    string error_message = 2;
  }
  motionlab.mechanism.Geometry geometry = 3;
  motionlab.mechanism.Body former_parent_body = 4;
}

// Delete a geometry from the mechanism
message DeleteGeometryCommand {
  motionlab.mechanism.ElementId geometry_id = 1;
}

message DeleteGeometryResult {
  oneof result {
    motionlab.mechanism.ElementId deleted_id = 1;
    string error_message = 2;
  }
}

// Rename a geometry
message RenameGeometryCommand {
  motionlab.mechanism.ElementId geometry_id = 1;
  string name = 2;
}

message RenameGeometryResult {
  oneof result {
    motionlab.mechanism.Geometry geometry = 1;
    string error_message = 2;
  }
}

// Update body mass properties (set override or revert to computed)
message UpdateMassPropertiesCommand {
  motionlab.mechanism.ElementId body_id = 1;
  bool mass_override = 2;                         // true = use provided values, false = recompute from geometries
  motionlab.mechanism.MassProperties mass_properties = 3;  // only used if mass_override = true
}

message UpdateMassPropertiesResult {
  oneof result {
    motionlab.mechanism.Body body = 1;    // returns body with effective mass properties
    string error_message = 2;
  }
}

// ──────────────────────────────────────────────
// Primitive body creation (Scene Building C1)
// ──────────────────────────────────────────────

// Create a Body + Geometry pair from a parametric primitive shape.
// Engine generates a full B-Rep solid (OCCT), tessellates it, computes mass properties,
// and stores the shape in ShapeRegistry for face-aware datum creation.
message CreatePrimitiveBodyCommand {
  motionlab.mechanism.PrimitiveShape shape = 1;
  string name = 2;
  motionlab.mechanism.Vec3 position = 3;       // initial world position
  motionlab.mechanism.PrimitiveParams params = 4;
  double density = 5;                           // kg/m³, 0 = use default (1000)
}

message CreatePrimitiveBodyResult {
  oneof result {
    GeometryImportResult geometry = 1;
    string error_message = 2;
  }
  motionlab.mechanism.Body body = 3;  // the created body with effective mass properties
}

// Update dimensions of an existing primitive geometry.
// Engine regenerates B-Rep, re-tessellates, recomputes mass, updates shape registry.
message UpdatePrimitiveCommand {
  motionlab.mechanism.ElementId geometry_id = 1;
  motionlab.mechanism.PrimitiveParams params = 2;
  double density = 3;    // kg/m³, 0 = keep current density
}

message UpdatePrimitiveResult {
  oneof result {
    UpdatePrimitiveSuccess success = 1;
    string error_message = 2;
  }
}

message UpdatePrimitiveSuccess {
  motionlab.mechanism.Geometry geometry = 1;        // updated geometry with new primitive_source
  motionlab.mechanism.DisplayMesh display_mesh = 2; // new tessellated mesh
  motionlab.mechanism.Body parent_body = 3;         // body with recomputed aggregate mass
  repeated uint32 part_index = 4;                    // face-aware picking indices
  uint32 face_count = 5;
}

// ──────────────────────────────────────────────
// Collision authoring (Scene Building E1)
// ──────────────────────────────────────────────

// Set or modify the collision configuration for a geometry.
// Engine computes auto-fit dimensions when shape dimensions are zero.
message UpdateCollisionConfigCommand {
  motionlab.mechanism.ElementId geometry_id = 1;
  motionlab.mechanism.CollisionConfig collision_config = 2;
}

message UpdateCollisionConfigResult {
  oneof result {
    UpdateCollisionConfigSuccess success = 1;
    string error_message = 2;
  }
}

message UpdateCollisionConfigSuccess {
  motionlab.mechanism.Geometry geometry = 1;                       // updated geometry with collision_config
  motionlab.mechanism.CollisionConfig resolved_config = 2;  // with auto-fit dimensions filled in
}

// Joint CRUD — Command→Result pattern with oneof success/error

message CreateJointCommand {
  motionlab.mechanism.Joint draft = 1;
}

message UpdateJointCommand {
  motionlab.mechanism.Joint joint = 1;
}

message DeleteJointCommand {
  motionlab.mechanism.ElementId joint_id = 1;
}

message CreateJointResult {
  oneof result {
    motionlab.mechanism.Joint joint = 1;
    string error_message = 2;
  }
}

message UpdateJointResult {
  oneof result {
    motionlab.mechanism.Joint joint = 1;
    string error_message = 2;
  }
}

message DeleteJointResult {
  oneof result {
    motionlab.mechanism.ElementId deleted_id = 1;
    string error_message = 2;
  }
}

message CreateLoadCommand {
  motionlab.mechanism.Load draft = 1;
}

message UpdateLoadCommand {
  motionlab.mechanism.Load load = 1;
}

message DeleteLoadCommand {
  motionlab.mechanism.ElementId load_id = 1;
}

message CreateLoadResult {
  oneof result {
    motionlab.mechanism.Load load = 1;
    string error_message = 2;
  }
}

message UpdateLoadResult {
  oneof result {
    motionlab.mechanism.Load load = 1;
    string error_message = 2;
  }
}

message DeleteLoadResult {
  oneof result {
    motionlab.mechanism.ElementId deleted_id = 1;
    string error_message = 2;
  }
}

message CreateActuatorCommand {
  motionlab.mechanism.Actuator draft = 1;
}

message UpdateActuatorCommand {
  motionlab.mechanism.Actuator actuator = 1;
}

message DeleteActuatorCommand {
  motionlab.mechanism.ElementId actuator_id = 1;
}

message CreateActuatorResult {
  oneof result {
    motionlab.mechanism.Actuator actuator = 1;
    string error_message = 2;
  }
}

message UpdateActuatorResult {
  oneof result {
    motionlab.mechanism.Actuator actuator = 1;
    string error_message = 2;
  }
}

message DeleteActuatorResult {
  oneof result {
    motionlab.mechanism.ElementId deleted_id = 1;
    string error_message = 2;
  }
}

// ──────────────────────────────────────────────
// Simulation lifecycle (Epic 7.2)
// ──────────────────────────────────────────────

// Solver type for the constraint solver (NSC systems)
enum SolverType {
  SOLVER_PSOR = 0;                       // Projected SOR (fast, good for most cases)
  SOLVER_BARZILAI_BORWEIN = 1;           // BB (good convergence for ill-conditioned)
  SOLVER_APGD = 2;                       // Accelerated PGD (robust for large systems)
  SOLVER_MINRES = 3;                     // Minimal residual (most precise, slowest)
}

// Time integrator type
enum IntegratorType {
  INTEGRATOR_EULER_IMPLICIT_LINEARIZED = 0;  // Fast, stable, first-order (default)
  INTEGRATOR_HHT = 1;                         // Hilber-Hughes-Taylor (second-order)
  INTEGRATOR_NEWMARK = 2;                      // Newmark-beta (structural dynamics)
}

// Solver and integrator configuration
message SolverSettings {
  SolverType type = 1;                   // default: SOLVER_PSOR
  int32 max_iterations = 2;              // default: 100
  double tolerance = 3;                  // default: 1e-8
  IntegratorType integrator = 4;         // default: INTEGRATOR_EULER_IMPLICIT_LINEARIZED
}

// Global contact material defaults (NSC)
message ContactSettings {
  double friction = 1;                   // Coulomb friction coefficient, default 0.3
  double restitution = 2;               // Coefficient of restitution, default 0.0
  double compliance = 3;                // Contact compliance, default 0.0 (rigid)
  double damping = 4;                   // Contact damping, default 0.0
  bool enable_contact = 5;              // Enable contact detection, default true (proto3 default is false; absence of ContactSettings means enabled)
}

// Compilation diagnostic severity
enum DiagnosticSeverity {
  DIAGNOSTIC_INFO = 0;
  DIAGNOSTIC_WARNING = 1;
  DIAGNOSTIC_ERROR = 2;
}

// Structured compilation diagnostic with entity linking
message CompilationDiagnostic {
  DiagnosticSeverity severity = 1;
  string message = 2;
  repeated string affected_entity_ids = 3;  // body/joint/datum IDs involved
  string suggestion = 4;                     // e.g. "Add a Fixed joint to anchor this body"
  string code = 5;                           // machine-readable code, e.g. "FLOATING_BODY"
}

// Simulation configuration passed at compile time
message SimulationSettings {
  double timestep = 1;                    // seconds, default 0.001
  motionlab.mechanism.Vec3 gravity = 2;   // m/s^2, default (0, -9.81, 0)
  SolverSettings solver = 3;             // optional, defaults apply if absent
  ContactSettings contact = 4;           // optional, defaults apply if absent
  double duration = 5;                    // seconds, default 10.0 (informational for frontend)
}

// Compile the current mechanism state into a simulation system
message CompileMechanismCommand {
  SimulationSettings settings = 1;  // optional, defaults apply if absent
}

enum SimulationAction {
  SIMULATION_ACTION_UNSPECIFIED = 0;
  SIMULATION_ACTION_PLAY = 1;
  SIMULATION_ACTION_PAUSE = 2;
  SIMULATION_ACTION_STEP = 3;
  SIMULATION_ACTION_RESET = 4;
}

message SimulationControlCommand {
  SimulationAction action = 1;
}

message CompilationResultEvent {
  bool success = 1;
  string error_message = 2;
  repeated string diagnostics = 3 [deprecated = true];  // use structured_diagnostics
  repeated OutputChannelDescriptor channels = 4;
  repeated CompilationDiagnostic structured_diagnostics = 5;
}

enum SimStateEnum {
  SIM_STATE_IDLE = 0;
  SIM_STATE_COMPILING = 1;
  SIM_STATE_RUNNING = 2;
  SIM_STATE_PAUSED = 3;
  SIM_STATE_ERROR = 4;
}

message SimulationStateEvent {
  SimStateEnum state = 1;
  double sim_time = 2;
  uint64 step_count = 3;
}

// CRUD command/result payloads use motionlab.mechanism.ElementId wrappers for
// entity references. Frame-rate streaming messages (BodyPoseData, JointStateData)
// and persistence messages (MissingAssetInfo, RelocateAssetCommand) use plain
// string IDs to avoid wrapper allocations on the hot path.
message BodyPoseData {
  string body_id = 1;
  motionlab.mechanism.Vec3 position = 2;
  motionlab.mechanism.Quat orientation = 3;
}

message JointStateData {
  string joint_id = 1;
  double position = 2;
  double velocity = 3;
  motionlab.mechanism.Vec3 reaction_force = 4;
  motionlab.mechanism.Vec3 reaction_torque = 5;
}

message SimulationFrame {
  double sim_time = 1;
  uint64 step_count = 2;
  repeated BodyPoseData body_poses = 3;
  repeated JointStateData joint_states = 4 [deprecated = true];
}

// ──────────────────────────────────────────────
// Output channels + trace streaming (Epic 8.1)
// ──────────────────────────────────────────────

enum ChannelDataType {
  CHANNEL_DATA_TYPE_UNSPECIFIED = 0;
  CHANNEL_DATA_TYPE_SCALAR = 1;
  CHANNEL_DATA_TYPE_VEC3 = 2;
}

message OutputChannelDescriptor {
  string channel_id = 1;    // e.g., "joint/abc-123/coord/rot_z"
  string name = 2;          // human-readable: "Revolute1 Position"
  string unit = 3;          // e.g., "rad", "m", "N", "Nm"
  ChannelDataType data_type = 4;
}

message TimeSample {
  double time = 1;
  oneof value {
    double scalar = 2;
    motionlab.mechanism.Vec3 vector = 3;
  }
}

message SimulationTrace {
  string channel_id = 1;
  repeated TimeSample samples = 2;
}

message ScrubCommand {
  double time = 1;
}

// ──────────────────────────────────────────────
// Project persistence (Epic 6.4)
// ──────────────────────────────────────────────

message SaveProjectCommand {
  string project_name = 1;
}

message SaveProjectResult {
  oneof result {
    bytes project_data = 1;
    string error_message = 2;
  }
}

message LoadProjectCommand {
  bytes project_data = 1;
}

message LoadProjectResult {
  oneof result {
    LoadProjectSuccess success = 1;
    string error_message = 2;
  }
}

message LoadProjectSuccess {
  motionlab.mechanism.Mechanism mechanism = 1;
  repeated BodyImportResult bodies = 2;
  motionlab.mechanism.ProjectMetadata metadata = 3;
  repeated MissingAssetInfo missing_assets = 4;
  repeated GeometryImportResult geometries = 5;
}

// Information about an asset that could not be found or validated on project load
message MissingAssetInfo {
  string body_id = 1;
  string body_name = 2;
  motionlab.mechanism.AssetReference expected_asset = 3;
  string reason = 4;  // "file_not_found", "hash_mismatch", "cache_corrupted"
}

// ──────────────────────────────────────────────
// Asset relocation (Epic 9.1)
// ──────────────────────────────────────────────

message RelocateAssetCommand {
  string body_id = 1;
  string new_file_path = 2;
  ImportOptions import_options = 3;
}

message RelocateAssetResult {
  oneof result {
    BodyImportResult body = 1;
    string error_message = 2;
  }
}

// ──────────────────────────────────────────────
// New project (Epic 20.1)
// ──────────────────────────────────────────────

message NewProjectCommand {
  string project_name = 1;
}

message NewProjectResult {
  bool success = 1;
  string error_message = 2;
}

// ──────────────────────────────────────────────
// Asset placement (Workstream A2)
// ──────────────────────────────────────────────

// Place an already-imported asset into the scene with fresh entity IDs.
message PlaceAssetInSceneCommand {
  string asset_id = 1;                          // cache_key from original import
  motionlab.mechanism.Vec3 position = 2;        // world-space spawn position
}

message PlaceAssetInSceneResult {
  bool success = 1;
  string error_message = 2;
  repeated GeometryImportResult geometries = 3; // newly created entities
  repeated BodyImportResult bodies = 4;         // backward compat
  string asset_id = 5;                          // echoed back for frontend correlation
}
