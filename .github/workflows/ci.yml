name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install native toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Prepare vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
          "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh"
      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: native/engine/build/vcpkg_installed
          key: vcpkg-linux-${{ hashFiles('native/engine/vcpkg.json') }}
          restore-keys: vcpkg-linux-
      - name: Install protobuf via vcpkg (protoc provisioning)
        run: |
          "$RUNNER_TEMP/vcpkg/vcpkg" install protobuf:x64-linux --x-install-root="$GITHUB_WORKSPACE/native/engine/build/vcpkg_installed"
      - name: Verify generated proto files are fresh
        run: |
          pnpm generate:proto
          git diff --exit-code -- packages/protocol/src/generated/ native/engine/src/generated/
      - name: Biome check
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Sync OCCT WASM renderer assets
        run: pnpm sync:occt-wasm
      - name: Build desktop renderer bundle
        run: pnpm --dir apps/desktop exec vite build --config vite.renderer.config.mjs
      - name: Verify desktop CAD runtime assets
        run: pnpm verify:desktop-cad-assets
      - name: Workspace tests
        id: js-tests
        run: pnpm turbo run test
      - name: Test results summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- **JS workspace tests:** ${{ steps.js-tests.outcome }}" >> $GITHUB_STEP_SUMMARY
