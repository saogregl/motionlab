name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  js-and-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Buf lint
        run: pnpm lint:proto
      - name: Buf breaking change detection
        if: github.event_name == 'pull_request'
        run: pnpm breaking:proto
      - name: Verify generated proto files are fresh
        run: |
          pnpm generate:proto
          git diff --exit-code -- packages/protocol/src/generated/ native/engine/src/generated/
      - name: Generate docs inventories
        run: pnpm docs:generate
      - name: Check docs structure
        run: pnpm docs:check
      - name: Biome check
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Workspace tests
        run: pnpm turbo run test

  native-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++
      - name: Prepare vcpkg
        run: git clone https://github.com/microsoft/vcpkg.git "$RUNNER_TEMP/vcpkg"
      - name: Bootstrap vcpkg
        run: "$RUNNER_TEMP/vcpkg/bootstrap-vcpkg.sh"
      - name: Configure native engine
        working-directory: native/engine
        env:
          VCPKG_ROOT: ${{ runner.temp }}/vcpkg
        run: cmake --preset dev
      - name: Build native engine
        working-directory: native/engine
        run: cmake --build build/dev
      - name: Run native tests
        working-directory: native/engine
        run: ctest --preset dev
