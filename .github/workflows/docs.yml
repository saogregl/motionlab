name: docs

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/**"
      - "AGENTS.md"
      - "apps/AGENTS.md"
      - "packages/**/AGENTS.md"
      - "native/engine/AGENTS.md"
      - "agents/skills/**"
      - "scripts/**"
      - "readme.md"
      - "plan.md"

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate docs inventories
        run: pnpm docs:generate
      - name: Docs check
        run: pnpm docs:check
      - name: Markdown lint
        run: pnpm dlx markdownlint-cli2 "docs/**/*.md" "*.md" ".github/**/*.md"
      - name: Install Vale
        uses: errata-ai/vale-action@v2.1.1
        with:
          files: docs readme.md plan.md
