name: Bug report
description: Capture a defect with reproduction and ownership context.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include command, environment, and exact observed behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: affected
    attributes:
      label: Affected modules
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Tests and docs impact
    validations:
      required: true
