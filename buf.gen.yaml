version: v2
clean: true
plugins:
  # TypeScript — protobuf-es v2 (local binary from node_modules/.bin)
  - local: protoc-gen-es
    out: packages/protocol/src/generated
    opt:
      - target=ts
      - import_extension=js

  # C++ — using vcpkg's protoc to match the installed protobuf runtime
  - protoc_builtin: cpp
    out: native/engine/src/generated
